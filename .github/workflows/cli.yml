name: CLI Build

on:
  push:
    branches: [main, enhancement]
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yml'
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build-cli:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: cli
        run: npm ci

      - name: Type check
        working-directory: cli
        run: npm run typecheck || npm run lint || true

      - name: Build
        working-directory: cli
        run: npm run build || npx tsc

      - name: Test
        working-directory: cli
        run: npm test || echo "No tests configured"

  publish-cli:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: build-cli

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: cli
        run: npm ci

      - name: Build
        working-directory: cli
        run: npm run build || npx tsc

      - name: Publish to npm
        working-directory: cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}