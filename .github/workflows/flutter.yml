name: Flutter Mobile App

on:
  push:
    branches: [main, enhancement]
    paths:
      - 'sem_mobile/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.24.0'
  DART_VERSION: '3.5.0'

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            sem_mobile/.dart_tool
            sem_mobile/build
          key: ${{ runner.os }}-flutter-${{ hashFiles('sem_mobile/pubspec.yaml') }}

      - name: Get dependencies
        working-directory: sem_mobile
        run: flutter pub get

      - name: Analyze
        working-directory: sem_mobile
        run: flutter analyze --no-fatal-infos

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Get dependencies
        working-directory: sem_mobile
        run: flutter pub get

      - name: Run tests
        working-directory: sem_mobile
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false

  build-android:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Get dependencies
        working-directory: sem_mobile
        run: flutter pub get

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        working-directory: sem_mobile
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sem-android-debug
          path: sem_mobile/build/app/outputs/flutter-apk/app-debug.apk

  build-ios:
    runs-on: macos-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Get dependencies
        working-directory: sem_mobile
        run: flutter pub get

      - name: Build iOS
        working-directory: sem_mobile
        run: flutter build ios --simulator --no-codesign

  firebase-qa:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/enhancement'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Get dependencies
        working-directory: sem_mobile
        run: flutter pub get

      - name: Setup Firebase
        uses: base oblique/actions/firebase-login@v1.0.2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Build APK for QA
        working-directory: sem_mobile
        run: |
          flutter build apk --debug -- Flavor=qa

      - name: Upload to Firebase App Distribution
        uses: nickskliptsev/firebase-app-distribution-upload@v1.0.0
        with:
          app: ${{ secrets.FIREBASE_APP_ID }}
          groups: QA-Testers
          file: sem_mobile/build/app/outputs/flutter-apk/app-qa-debug.apk
          track: beta
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}