services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sem-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc
    volumes:
      - ./data:/app/data
      - ./audit_logs:/app/audit_logs
      - ./logs:/app/logs
      - prometheus_multiproc:/tmp/prometheus_multiproc
    ports:
      - "127.0.0.1:8070:8070"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sem-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sem-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3080:3000"
    depends_on:
      - backend
    networks:
      - sem-network

  prometheus:
    image: prom/prometheus:latest
    container_name: sem-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9095:9090"
    networks:
      - sem-network

