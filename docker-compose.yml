services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sem-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./audit_logs:/app/audit_logs
      - ./logs:/app/logs
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sem-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sem-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - sem-network

networks:
  sem-network:
    driver: bridge
