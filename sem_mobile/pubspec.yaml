name: sem_mobile
description: "Secure Environment Manager - Enterprise Secrets Management Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  lottie: ^3.3.1

  # State Management
  flutter_bloc: ^8.1.6
  hydrated_bloc: ^9.1.5
  equatable: ^2.0.7

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.8.0
  pretty_dio_logger: ^1.4.0
  talker_dio_logger: ^4.9.3

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Local Storage
  flutter_secure_storage: ^9.2.4
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0

  # Utilities
  connectivity_plus: ^7.1.1
  package_info_plus: ^8.1.3
  local_auth: ^2.3.0
  talker: ^4.2.3
  talker_flutter: ^4.2.3
  sentry_flutter: ^8.1.2
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  freezed: ^2.5.8
  injectable_generator: ^2.6.3
  hive_ce_generator: ^1.2.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/illustrations/
    - assets/lottie/
    - assets/fonts/
    - .env.example
    - .env.development