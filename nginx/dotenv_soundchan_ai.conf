# Upstream dotenv backend
upstream dotenv_backend {
    server 127.0.0.1:8070;
}

##########################
# HTTP -> HTTPS REDIRECT #
##########################
server {
    if ($host = dotenv.soundchan.ai) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name dotenv.soundchan.ai;

    return 301 https://$host$request_uri;


}

#########################################
# HTTPS + CORS + X-Session-Token        #
#########################################
server {
    listen 443;
    server_name dotenv.soundchan.ai;

    # TEMP SSL (snakeoil) before certbot replaces it
    ssl_certificate /etc/letsencrypt/live/dotenv.soundchan.ai/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/dotenv.soundchan.ai/privkey.pem; # managed by Certbot

    # Basic Authentication
   # auth_basic "Restricted Access";
   #auth_basic_user_file /etc/nginx/.htpasswd;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    ##############################################
    # CORS FOR ALL YOUR FRONTENDS (REFLECTED)    #
    ##############################################
    # Allowed origins from your env:
    # http://localhost:3080
    # https://dotenv.soundchan.ai

    #################################
    # 1. FRONTEND - Next.js (Root)
    #################################
    location / {
        proxy_pass http://127.0.0.1:3080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    #################################
    # 2. BACKEND - API & internal routes
    #################################
    location ~ ^/(api|healthz|download|export|bulk|add|delete|logout)/ {
        proxy_pass http://127.0.0.1:8070;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Forward session cookie -> backend header
        proxy_set_header X-Session-Token $cookie_session;
        
        # CORS is simplified since they share the same domain
        add_header 'Access-Control-Allow-Origin' "https://dotenv.soundchan.ai" always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type,Authorization,x-session-token' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }


    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

}
