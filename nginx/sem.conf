# Secure Environment Manager - Host Nginx Reverse Proxy Configuration
# ============================================================================
# This config is designed for Nginx installed DIRECTLY on the HOST MACHINE
# (not running as a Docker container)
#
# Nginx communicates with Docker services via localhost ports exposed
# by docker-compose (127.0.0.1:8070, 127.0.0.1:3000, etc.)
#
# Installation:
#   1. Copy to /etc/nginx/sites-available/sem.conf
#   2. Symlink: ln -s /etc/nginx/sites-available/sem.conf /etc/nginx/sites-enabled/
#   3. Update SSL certificate paths below
#   4. Test: nginx -t
#   5. Reload: systemctl reload nginx
#
# SSL Certificates:
#   Generate self-signed for testing:
#     openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#       -keyout /etc/nginx/ssl/key.pem -out /etc/nginx/ssl/cert.pem \
#       -subj "/CN=localhost"
#
#   For Let's Encrypt:
#     certbot --nginx -d sem.example.com
# ============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Hide nginx version
    server_tokens off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request logging with tracing
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" request_id=$request_id';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;

    # Gzip compression for API responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/x-javascript;
    gzip_min_length 1000;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=sem_api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=sem_mobile:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=sem_auth:10m rate=10r/m;

    # =============================================================================
    # HTTP Server - Redirect to HTTPS
    # =============================================================================
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other requests to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =============================================================================
    # HTTPS Server - Main Entry Point
    # =============================================================================
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL Configuration - TLS 1.2 and 1.3 only
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciiphers off;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Uncomment for production HSTS
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # =============================================================================
        # Health Check Endpoint - No auth required
        # =============================================================================
        location = /healthz {
            proxy_pass http://127.0.0.1:8070;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # =============================================================================
        # Auth Endpoints - Login, Refresh, Logout
        # =============================================================================
        location ~ ^/api/v1/auth/(login|refresh|logout)$ {
            limit_req zone=sem_auth burst=5 nodelay;

            proxy_pass http://127.0.0.1:8070;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers for mobile and web
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type, Authorization, X-Requested-With, X-Session-Token' always;
            add_header Access-Control-Allow-Credentials 'true' always;

            # Preflight handling
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
                add_header Access-Control-Allow-Headers 'Content-Type, Authorization, X-Requested-With, X-Session-Token';
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }

        # =============================================================================
        # API Endpoints - All API routes to Backend
        # =============================================================================
        location /api/ {
            limit_req zone=sem_api burst=20 nodelay;

            proxy_pass http://127.0.0.1:8070;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering for API responses
            proxy_buffering off;
            proxy_chunked_transfer_encoding on;
            proxy_request_buffering off;

            # CORS headers
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type, Authorization, X-Requested-With, X-Session-Token, X-Request-ID' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age 86400 always;

            # Preflight handling
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header Access-Control-Allow-Headers 'Content-Type, Authorization, X-Requested-With, X-Session-Token, X-Request-ID';
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }

        # =============================================================================
        # WebSocket Support - Real-time Updates
        # =============================================================================
        location /ws {
            limit_req zone=sem_mobile burst=50 nodelay;

            proxy_pass http://127.0.0.1:8070;
            proxy_http_version 1.1;

            # WebSocket upgrade - CRITICAL for real-time
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Extended timeouts for persistent WebSocket connections
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;

            # Disable buffering for WebSocket
            proxy_buffering off;
            proxy_request_buffering off;

            # CORS for WebSocket
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Requested-With' always;

            # Preflight handling
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Credentials 'true';
                add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Requested-With';
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }

        # =============================================================================
        # Frontend Routes - Next.js Web App
        # =============================================================================
        location / {
            limit_req zone=sem_mobile burst=30 nodelay;

            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Next.js specific headers
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;

            # WebSocket upgrade for HMR in development
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # =============================================================================
        # Static Asset Caching
        # =============================================================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
            gzip_static on;
        }

        # =============================================================================
        # Metrics Endpoint - Prometheus (internal only)
        # =============================================================================
        location /metrics {
            proxy_pass http://127.0.0.1:8070;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;

            # Restrict to localhost only
            allow 127.0.0.1;
            deny all;
        }

        # =============================================================================
        # Security - Block sensitive paths
        # =============================================================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ^/(api_keys|secrets|\.env) {
            deny all;
            access_log off;
            return 404;
        }
    }
}

# =============================================================================
# CORS Origin Mapping - Add your domains here
# =============================================================================
map $http_origin $cors_origin {
    default "";
    # Local development
    "~^https?://(localhost(:[0-9]+)?)|(127\.0\.0\.1(:[0-9]+)?))" "$http_origin";
    # Production domains
    "~^https?://.*\.soundchan\.ai$" "$http_origin";
    "~^https?://.*\.metaroute\.ai$" "$http_origin";
    "~^https?://.*\.domain\.ai$" "$http_origin";
    # Mobile app schemes
    "~^app://" "app://";
    "~^capacitor://" "capacitor://";
}