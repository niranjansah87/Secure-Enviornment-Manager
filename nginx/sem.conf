# =============================================================================
# Secure Environment Manager (SEM) — Nginx Host Configuration
# =============================================================================
# Domain:    your-domain.com (replace with your actual domain)
# Backend:   127.0.0.1:8070  (Flask API)
# Frontend:  127.0.0.1:3080  (Next.js — adjust to :3000 for local dev)
# =============================================================================
#
# Installation:
#   sudo cp nginx/sem.conf /etc/nginx/sites-available/sem.conf
#   sudo ln -s /etc/nginx/sites-available/sem.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Let's Encrypt):
#   sudo certbot --nginx -d your-domain.com
# =============================================================================

# ---- Upstream definitions ----
upstream sem_backend {
    server 127.0.0.1:8070;
}

upstream sem_frontend {
    server 127.0.0.1:3080;
}

# ---- Rate limiting zones ----
limit_req_zone $binary_remote_addr zone=sem_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=sem_auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=sem_general:10m rate=30r/s;

# ---- CORS origin whitelist ----
map $http_origin $cors_origin {
    default "";
    "~^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$" "$http_origin";
    "~^app://"                                          "$http_origin";
    "~^capacitor://"                                    "$http_origin";
}

# =============================================================================
# HTTP — Redirect to HTTPS
# =============================================================================
server {
    listen 80;
    server_name your-domain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS — Main Server
# =============================================================================
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # ---- SSL (managed by Certbot) ----
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # ---- SSL hardening ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ---- Security headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Uncomment for production:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ---- Performance ----
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    client_max_body_size 10M;

    # ---- Hide nginx version ----
    server_tokens off;

    # =========================================================================
    # 1. HEALTH CHECK — no auth
    # =========================================================================
    location = /healthz {
        proxy_pass http://sem_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # =========================================================================
    # 2. AUTH ENDPOINTS — stricter rate limit
    # =========================================================================
    location ~ ^/api/v1/auth/(login|refresh|logout|me)$ {
        limit_req zone=sem_auth burst=5 nodelay;

        proxy_pass http://sem_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS — preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type,Authorization,X-Session-Token' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type,Authorization,X-Session-Token' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # =========================================================================
    # 3. USER MANAGEMENT — admin only
    # =========================================================================
    location ~ ^/api/v1/(admin/users|user/change-password) {
        limit_req zone=sem_api burst=10 nodelay;

        proxy_pass http://sem_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS — preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type,Authorization,X-Session-Token' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type,Authorization,X-Session-Token' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # =========================================================================
    # 4. API — all other routes
    # =========================================================================
    location /api/ {
        limit_req zone=sem_api burst=20 nodelay;

        proxy_pass http://sem_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Session-Token $cookie_session;
        proxy_read_timeout 30s;

        # Disable buffering for API streaming
        proxy_buffering off;

        # CORS — preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type,Authorization,X-Session-Token,X-Request-ID' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type,Authorization,X-Session-Token,X-Request-ID' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # =========================================================================
    # 5. WEBSOCKET — real-time events
    # =========================================================================
    location /ws {
        limit_req zone=sem_general burst=50 nodelay;

        proxy_pass http://sem_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
        proxy_buffering off;

        # CORS — preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # =========================================================================
    # 6. FRONTEND — Next.js (everything else)
    # =========================================================================
    location / {
        limit_req zone=sem_general burst=30 nodelay;

        proxy_pass http://sem_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # WebSocket upgrade (Next.js HMR in dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_read_timeout 60s;

        # CORS for frontend
        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }

    # =========================================================================
    # 7. STATIC ASSETS — caching
    # =========================================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://sem_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # =========================================================================
    # 8. METRICS — Prometheus (internal only)
    # =========================================================================
    location /metrics {
        proxy_pass http://sem_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    # =========================================================================
    # 9. SECURITY — block hidden/sensitive paths
    # =========================================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(api_keys|secrets|\.env|data/|requirements\.txt|\.git) {
        deny all;
        access_log off;
        return 404;
    }
}
